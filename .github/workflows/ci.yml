name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install ruff
      - name: Lint
        run: ruff check spindle/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          sudo apt-get update && sudo apt-get install -y libchromaprint-tools
          pip install -e . mypy types-PyYAML types-requests
      - name: Type check
        run: mypy spindle/ --ignore-missing-imports --no-strict-optional

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libchromaprint-tools ffmpeg
      - name: Install package
        run: pip install -e .
      - name: Smoke test
        run: spindle --version
